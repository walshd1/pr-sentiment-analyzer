name: 'PR Sentiment Analyzer'
description: 'Analyzes the sentiment of a pull request description and comments to flag potentially negative or confusing language.'
author: 'walshd1'
branding:
  icon: 'zap'
  color: 'blue'
inputs:
  gemini_api_key:
    description: 'Gemini API key (free)'
    required: false
  service_token:
    description: 'Service token (paid)'
    required: false
outputs:
  result:
    description: 'Result'
runs:
  using: 'node20'
  main: 'dist/index.js'
